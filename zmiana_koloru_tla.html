<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            
            
            display: flex;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        
        }
        .white_body {
            background-color: #EEF5DB;
        }
        .black_body {
            background-color: black ;
        }

        form {
                height: 200px;
                width:600px;
                display: flex;
                position: relative;
                border-radius: 12px;
                justify-content: space-around;
                align-items: center;
                gap:20px;
                
            }
        .white_form {
            background-color: #EEF5DB;
            color: #FE5F55;
        }
        .black_form {
            background-color: #0D0D0D;
            color: #CCFF00;
        }
            

            @property --angle {
                syntax: "<angle>";
                initial-value: 0deg;
                inherits: false;
            }
            :root {
                --color1: #FE5F55;
                --color2: #F0B67F;
                --color3: #D6D1B1;
                --color4: #CCFF00;
                --color5: #FF007F;
                --color6: #FF5F00;
                --gradient1: conic-gradient(from var(--angle), cyan, white, cyan);
                --gradient2: conic-gradient(from var(--angle), pink, white, pink);
            }

        form::after, form::before {
            position: absolute;
            content: '';
            width:100%;
            height: 100%;
            top:50%;
            left:50%;
            translate: -50% -50%;
            
            z-index: -1;
            border-radius: 12px;
            padding:4px;
            animation: anime 2s linear infinite;
        }
        .white_form::after, .white_form::before {
            background:conic-gradient(from var(--angle),var(--color1),var(--color2),var(--color3),var(--color1));
        }   
        .black_form::after, .black_form::before {
            background:conic-gradient(from var(--angle),var(--color4),var(--color5),var(--color6),var(--color4));
        }   

        form > div >  input[type="radio"] {
            appearance: none;
            width:30px;
            height: 30px;
            
            border-radius: 50%;
            margin-left:30px;
            position: relative;
        }
        .white_form > div >  input[type="radio"] {
            border:2px solid cyan;
        }
        .black_form > div >  input[type="radio"] {
            border:2px solid pink;
        }
        input[type="radio"]::after, input[type="radio"]::before {
            content: '';
            position: absolute;
            width:100%;
            height: 100%;
            top:50%;
            left:50%;
            translate: -50% -50%;
            border-radius: 50%;
        }
        input[type="radio"]::before {
            filter: blur(1.5rem);
        }
        .white_form > div > input[type="radio"]:checked::after, .white_form > div > input[type="radio"]:checked::before {
            background: var(--gradient1);
        }
        .black_form > div > input[type="radio"]:checked::after, .black_form > div > input[type="radio"]:checked::before {
            background: var(--gradient2);
        }

        



        @keyframes anime {
            from {
                --angle: 0deg;
            }
            to {
                --angle: 360deg;
            }
        }

        
    </style>
</head>
<body class="white_body">
    <form class="white_form">
        <div class="div1">
        <label for="white">White</label>
        <input type="radio" name="color" id="white" value="white" checked>
        </div>
        <div class="div2">
        <label for="black">Black</label>
        <input type="radio" name="color" id="black" value="black">
        </div>
    </form>

    <script>
        const form = document.querySelector('form')

        function check() {
            const style = form.color.value
            document.body.className = style + '_body' 
            form.className =  style + '_form' 
        }

        form.addEventListener('change', check)
    </script>
</body>
</html>
