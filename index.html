<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            justify-content: center;
            
        }
        ul {
            list-style-type: none;
            display: flex;
            flex-direction: row;
            
        }
        li {
            border-bottom: 1px solid rgb(0, 0, 0);
            border-right: 1px solid black ;
            padding:17px;
            position: relative;
            z-index: 1;
        }
        .left {
            border-left: 1px solid black;
        }
        li::after {
            content: '';
            position: absolute;
            width:100%;
            height: .2em;
            background: linear-gradient(to right, red, blue);
            left:0;
            bottom:0;
            transition: 0.2s linear;
            z-index: -1;
        }
        li:hover::after {
            
            
            height:80%;
            
        }
        
        
    </style>
</head>
<body>
    <div class="box">
    <div class="btns">
            <ul>
                <li class="left">Loading...</li>
                <li>Loading...</li>
                <li>Loading...</li>
                <li>Loading...</li>
            </ul>
    </div>
    </div>

    <script>
        const lis = document.querySelectorAll('li')

        async function get() {
            try {
                const dane = await fetch("https://jsonplaceholder.typicode.com/users")
                const rozpakowane = await dane.json()
                const names = []
                let counter = 1
                rozpakowane.forEach(element => {
                    if(counter <= 4) {
                        names.push(element.username)
                    }
                    counter++
                });
                counter = 0
                names.forEach(element => {
                    lis[counter].textContent = element
                    counter++
                });
            } catch (error) {
                console.log(error)
            }
        }
        get()
    </script>
</body>
</html>
