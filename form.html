<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: black;
            display: flex;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        form {
            width:600px;
            background-color: black;
            color:white;
            border-radius: 12px;
            position:relative;
            padding:30px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(5, 1fr);
        }
        label[for="imie"] {
            grid-column: 1/3;
            grid-row: 1/2;
        }
        label[for="nazwisko"] {
            grid-column: 1/3;
            grid-row: 3/4;
        }
        label[for="zgoda"] {
            grid-column: 8/12;
            grid-row: 2/3;
        }
        label[for="newsletter"] {
            grid-column: 8/12;
            grid-row: 4/5;
        }
        #imie {
            grid-column: 1/7;
            grid-row: 2/3;
        }
        #nazwisko {
            grid-column: 1/7;
            grid-row: 4/5;
        }
        #newsletter {
            grid-column: 12/13;
            grid-row: 4/5;
        }
        #zgoda {
            grid-column: 12/13;
            grid-row: 2/3;
        }
        input[type="text"] {
            margin-bottom: 20px;
        }
        
        @property --angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        form::after, form::before {
            content: '';
            position: absolute;
            width:100%;
            height: 100%;
            background: conic-gradient(from var(--angle),transparent 80%,cyan, white, cyan);
            top:50%;
            left:50%;
            translate: -50% -50%;
            z-index: -1;
            padding:4px;
            border-radius: 12px;
            animation:anime 2s infinite linear;
        }

        form::before {
            filter: blur(1.5rem);
        }

        @keyframes anime {
            from {
                --angle: 0deg;
            }
            to {
                --angle: 360deg;
            }
        }
        input[type="checkbox"] {
            appearance: none;
            width:30px;
            height: 30px;
            border-radius: 50%;
            border:2px solid cyan;
            position: relative;
            
        }
        
        input[type="checkbox"]::after, input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width:100%;
            height: 100%;
            
            background:conic-gradient(cyan, white,cyan);
            border-radius: 50%;
            opacity:0;
            transition:all 0.3s linear;
        }
        input[type="checkbox"]:checked::after{
            opacity:1;  
        }
        input[type="checkbox"]:checked::before{
            filter: blur(1.5rem);  
            opacity:1;
        }
        
        

    </style>
</head>
<body>
    <form>

        <label for="imie" >podaj imie</label>
        <input type="text" id="imie" name="imie"> <br> <br>
        <label for="nazwisko">podaj nazwisko</label>
        <input type="text" id="nazwisko" name="nazwisko"> <br> <br>
        <label for="zgoda">zgoda na przetwarzanie danych</label>
        <input type="checkbox" name="zgoda" id="zgoda"> <br> <br>
        <label for="newsletter">chcę otrzymywać newsletter</label>
        <input type="checkbox" name="newsletter" id="newsletter">
    </form>
</body>
</html>
